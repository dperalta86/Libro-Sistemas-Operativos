title: ""
author: ""
date: ""
subject: "Sistemas Operativos"
keywords: [Sistemas Operativos, Operating Systems, Unix, Linux, Procesos, Memoria, Concurrencia]
subtitle: ""
lang: "es"

# --- Portada (eisvogel) ---
titlepage: true
titlepage-text-color: "FFFFFF"
titlepage-rule-color: "360049"
titlepage-rule-height: 0
titlepage-background: "src/images/portada.jpeg"

# --- Clase de documento ---
documentclass: scrbook
book: true
classoption: "twoside,openright"
