  Daniel Peralta es estudiante avanzado en Ingeniería en Sistemas de Información en la Universidad 
  Tecnológica Nacional. Founder de la consultora Madariaga, ha desarrollado ChameleonDB, una herramienta de gestión de bases de datos. 
